<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER//RADIO — Live Stream Portal</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chrome, Firefox OS and Opera -->
  	<meta name="theme-color" content="#0a0a0f">
  	<meta name="theme-color" media="(prefers-color-scheme: light)" content="#0a0a0f" />
  	<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0f" />

  	<!-- Windows Phone -->
  	<meta name="msapplication-navbutton-color" content="#0a0a0f">
  	<!-- iOS Safari -->
  	<meta name="apple-mobile-web-app-status-bar-style" content="#0a0a0f">


    <!-- Matomo -->
    <script>
      var _paq = window._paq = window._paq || [];
      /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
      _paq.push(['trackPageView']);
      _paq.push(['enableLinkTracking']);
      (function() {
        var u="https://matomo.wd5.net.ar/";
        _paq.push(['setTrackerUrl', u+'matomo.php']);
        _paq.push(['setSiteId', '66']);
        var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
        g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
      })();
    </script>
    <!-- End Matomo Code -->



</head>
<body>

    <div class="scanlines"></div>
    <div class="crt-flicker"></div>

    <header class="header">
        <div class="header__logo">
            <span class="header__icon">◈</span>
            <h1 class="header__title" data-text="CYBER//RADIO">CYBER//RADIO</h1>
        </div>
        <div class="header__status">
            <span class="header__live-dot" id="liveDot"></span>
            <span class="header__live-text" id="liveText">OFFLINE</span>
        </div>
        <button class="header__menu-btn" id="menuToggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main class="main">
        <section class="player">
            <div class="player__screen" id="playerScreen">
                <canvas id="vizCanvas"></canvas>
                <div class="player__overlay">
                    <div class="player__station-name" id="stationDisplay">CYBER//RADIO</div>
                    <div class="player__genre" id="genreDisplay">SELECT A CHANNEL</div>
                </div>
            </div>

            <div class="player__info">
                <div class="player__now-playing">
                    <span class="player__label">NOW PLAYING //</span>
                    <span class="player__channel-name" id="channelName">—</span>
                </div>
                <div class="player__controls">
                    <button class="player__btn" id="btnPrev" title="Previous">⟨⟨</button>
                    <button class="player__btn player__btn--play" id="btnPlay" title="Play / Pause">▶</button>
                    <button class="player__btn" id="btnNext" title="Next">⟩⟩</button>
                    <button class="player__btn player__btn--vol" id="btnMute" title="Mute">◉</button>
                    <input type="range" class="player__volume" id="volumeSlider" min="0" max="100" value="80">
                </div>
            </div>

            <audio id="audioPlayer" preload="none"></audio>
        </section>

        <aside class="channels" id="channelsSidebar">
            <div class="channels__header">
                <h2 class="channels__title">⟁ CHANNELS</h2>
                <div class="channels__count" id="channelCount">0</div>
            </div>
            <div id="channelGroups"></div>
        </aside>
    </main>

    <footer class="footer">
        <p>CYBER//RADIO v2.0 — <span class="footer__year"></span> — OPEN DIRECTLY FROM FILE:// — NO SERVER NEEDED - <a class="developer" href="https://www.wd5.com.ar/" target="_blank">Developed by WD5</a></p>
    </footer>

    <script src="functions.js"></script>
</body>
</html>
